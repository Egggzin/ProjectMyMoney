<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet" />
    <title>projectmymoney</title>
  </head>
  <body class="h-[100dvh] grid grid-cols-3 grid-rows-2">
    <aside
      class="px-2 py-5 justify-between flex flex-col bg-violet-950 row-span-2"
    >
      <h1 class="text-2xl font-bold px-6"></h1>
      <form id="investiment-form" class="w-full px-6">
        <div class="flex w-full flex-col my-2">
          <label for="goal-financial" class="font-bold text-violet-300"
            >Meta Financeira</label
          >
          <div class="flex">
            <input
              value="R$"
              class="w-1/6 bg-violet-300 text-center rounded-l-lg"
              type="text"
              disabled
            />
            <input
              type="text"
              class="w-5/6 bg-white rounded-r-lg px-2"
              id="goal-financial"
              name="goal-financial"
              required
              placeholder="0.00"
            />
          </div>
        </div>
        <div class="flex w-full flex-col my-2">
          <label for="initial-investment" class="font-bold text-violet-300"
            >Patrimônio inicial</label
          >
          <div class="flex w-full">
            <input
              value="R$"
              class="w-1/6 bg-violet-300 text-center rounded-l-lg"
              type="text"
              disabled
            />
            <input
              type="text"
              class="w-5/6 bg-white rounded-r-lg px-2"
              id="initial-investment"
              name="initial-investment"
              placeholder="0.00"
            />
          </div>
        </div>
        <div class="flex w-full flex-col my-2">
          <label for="time-amount" class="font-bold text-violet-300"
            >Prazo</label
          >
          <div class="flex w-full">
            <input
              type="text "
              class="w-2/3 bg-white rounded-l-lg px-2"
              id="time-amount"
              name="time-amount"
              required
            />
            <select
              class="w-1/3 bg-white text-center border-violet-950 border-l-2 rounded-r-lg hover:bg-violet-300 hover:text-violet-950 cursor-pointer"
              id="time-amount-period"
            >
              <option value="monthly">Mensal</option>
              <option value="yearly">Anual</option>
            </select>
          </div>
        </div>
        <div class="flex w-full flex-col my-2">
          <label for="return-rate" class="font-bold text-violet-300"
            >Rentabilidade</label
          >
          <div class="flex w-full">
            <input
              value="%"
              class="w-1/6 bg-violet-300 text-center rounded-l-lg"
              type="text"
              disabled
            />
            <input
              type="text"
              class="w-1/2 bg-white px-2"
              id="return-rate"
              name="return-rate"
              required
            />
            <select
              class="w-1/3 bg-white text-center border-violet-950 border-l-2 rounded-r-lg hover:bg-violet-300 hover:text-violet-950 cursor-pointer"
              id="evaluation-period"
            >
              <option value="monthly">Mensal</option>
              <option value="yearly">Anual</option>
            </select>
          </div>
        </div>
      </form>
      <div class="px-6 py-2 flex h-12 my-8 w-full gap-2">
        <button
          form="investiment-form"
          id="calculate-results"
          class="w-1/2 rounded-lg bg-violet-300 text-violet-950 hover:text-violet-950 hover:bg-violet-200 cursor-pointer"
        >
          Calcular
        </button>
        <button
          id="clearButton"
          class="w-1/2 rounded-lg hover:bg-violet-300 text-violet-300 hover:text-violet-950 cursor-pointer"
        >
          Limpar
        </button>
      </div>
    </aside>
    <main class="row-span-2 col-span-2">
      <section id="charts-container" class="h-full">
        <div class="h-[36%] flex flex-col items-center pb-10">
          <p class="font-bold text-lg">Resultado Final</p>
          <canvas id="final-money-distribution"></canvas>
        </div>
        <div class="h-[56%] flex flex-col items-center">
          <p class="font-bold text-lg">Progressão</p>
          <canvas id="progression"></canvas>
        </div>
      </section>
    </main>
    <script type="module" src="main.js"></script>
  </body>
</html>
