<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Limelight&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Oswald:wght@700&family=Syne+Mono&display=swap"
      rel="stylesheet"
    />
    <title>Calculadora de metas</title>
  </head>
  <body
    class="overflow-hidden h-[100dvh] grid grid-cols-4 grid-rows-2 font-sans"
  >
    <aside
      class="px-2 py-5 justify-between flex flex-col bg-gray-100 row-span-2 border border-gray-300 min-w-3xs"
    >
      <div class="flex flex-col gap-5 capitalize md:uppercase text-sm">
        <div class="flex flex-col px-1">
          <img
            src="logo.icon.png"
            alt="Logo Calculadora de metas"
            class="size-20 object-contain pc"
          />
          <h1 class="text-2xl font-bold px-5">Calculadora de Metas</h1>
        </div>
        <form id="investiment-form" class="w-full px-6">
          <div class="flex w-full flex-col my-2">
            <label
              for="goal-financial"
              class="font-bold text-gray-500 inline-block whitespace-nowrap"
              >Meta Final (R$)</label
            >
            <div class="flex">
              <input
                type="text"
                class="h-10 w-full bg-white rounded-lg px-2"
                id="goal-financial"
                name="goal-financial"
                required
                placeholder="0.00"
              />
            </div>
          </div>
          <div class="flex w-full flex-col my-2">
            <label
              for="initial-investment"
              class="font-bold text-gray-500 inline-block whitespace-nowrap"
              >Aporte Inicial (R$)</label
            >
            <div class="flex w-full">
              <input
                type="text"
                class="h-10 w-full bg-white rounded-lg px-2"
                id="initial-investment"
                name="initial-investment"
                required
                placeholder="0.00"
              />
            </div>
          </div>
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-1">
            <div class="flex flex-col">
              <label
                for="time-amount"
                class="font-bold text-gray-500 inline-block whitespace-nowrap"
                >Prazo (Anos)</label
              >
              <div class="flex w-full">
                <input
                  type="text "
                  class="h-10 w-full bg-white rounded-lg px-2"
                  id="time-amount"
                  name="time-amount"
                  required
                />
              </div>
            </div>
            <div class="flex flex-col">
              <label
                class="font-bold text-gray-500 inline-block whitespace-nowrap"
                >Juros (% A.A.)</label
              >
              <div class="flex w-full">
                <input
                  type="text"
                  class="h-10 w-full bg-white rounded-lg px-2"
                  id="return-rate"
                  name="return-rate"
                  required
                />
              </div>
            </div>
          </div>
        </form>
        <div class="px-6 py-2 flex flex-col my-8 w-full gap-2">
          <button
            form="investiment-form"
            id="calculate-results"
            class="w-full h-10 rounded-lg bg-gray-300 text-gray-150 hover:bg-gray-400 cursor-pointer font-semibold md:uppercase"
          >
            Calcular
          </button>
          <button
            id="clearButton"
            class="w-full h-10 rounded-lg text-gray-100 bg-gray-200 hover:bg-gray-300 cursor-pointer font-semibold md:uppercase"
          >
            Limpar
          </button>
        </div>
      </div>

      <p class="text-wrap text-xs px-6 py-2 text-center">
        Cálculos baseados em juros compostos mensais equivalentes. Impostos e
        taxas não são considerados.
      </p>
    </aside>
    <main
      class="row-span-2 col-span-2 flex flex-col h-full min-h-0 px-10 overflow-hidden"
    >
      <section id="container-info" class=""></section>
      <div id="carousel" class="flex-1 min-h-0 flex flex-col overflow-hidden">
        <section id="charts-container" class="shrink-0 h-[320px] flex gap-5">
          <div
            class="flex w-1/2 flex-col pt-3 pb-10 inline-block h-full max-h-[300px]"
          >
            <p
              class="font-bold text-lg uppercase border-b-1 border-gray-300 text-sm pb-1"
            >
              Composição de Patrimônio
            </p>
            <canvas id="final-money-distribution"></canvas>
          </div>
          <div
            class="flex w-1/2 flex-col pt-3 pb-10 inline-block h-full max-h-[300px]"
          >
            <p
              class="font-bold text-sm text-lg uppercase border-b-1 border-gray-300 pb-1"
            >
              Evolução Temporal
            </p>
            <canvas id="progression"></canvas>
          </div>
        </section>
        <section id="table-container" class="flex-1 min-h-0 flex flex-col">
          <p
            class="shrink-0 bg-white z-20 font-bold uppercase border-b border-gray-300 text-sm py-3"
          >
            Projeção Detalhada (Mensal)
          </p>
          <div class="flex-1 min-h-0 overflow-y-auto">
            <table
              id="results-table"
              class="w-full table-fixed border-collapse"
            ></table>
          </div>
        </section>
      </div>
    </main>
    <script type="module" src="/main.js"></script>
  </body>
</html>
