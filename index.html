<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet" />
    <title>Calculadora de metas</title>
  </head>
  <body class="h-[100dvh] grid grid-cols-4 grid-rows-2">
    <aside
      class="px-2 py-5 justify-between flex flex-col bg-gray-100 row-span-2 border border-gray-300"
    >
      <div class="flex flex-col gap-5">
        <div class="flex flex-col px-1">
          <img
            src="public/logo.icon.png"
            alt="Logo Calculadora de metas"
            class="size-20 object-contain pc"
          />
          <h1 class="text-2xl font-bold px-5">Calculadora de Metas</h1>
        </div>
        <form id="investiment-form" class="w-full px-6">
          <div class="flex w-full flex-col my-2">
            <label for="goal-financial" class="font-bold text-gray-500"
              >Meta Final (R$)</label
            >
            <div class="flex">
              <!-- <input
              value="R$"
              class="w-1/6 bg-violet-300 text-center rounded-l-lg"
              type="text"
              disabled
            /> -->
              <input
                type="text"
                class="h-10 w-full bg-white rounded-lg px-2"
                id="goal-financial"
                name="goal-financial"
                required
                placeholder="0.00"
              />
            </div>
          </div>
          <div class="flex w-full flex-col my-2">
            <label for="initial-investment" class="font-bold text-gray-500"
              >Aporte Inicial (R$)</label
            >
            <div class="flex w-full">
              <!-- <input
              value="R$"
              class="w-1/6 bg-violet-300 text-center rounded-l-lg"
              type="text"
              disabled
            /> -->
              <input
                type="text"
                class="h-10 w-full bg-white rounded-lg px-2"
                id="initial-investment"
                name="initial-investment"
                placeholder="0.00"
              />
            </div>
          </div>
          <div class="flex w-full my-2 justify-between">
            <div class="flex flex-col">
              <label for="time-amount" class="font-bold text-gray-500"
                >Prazo (Anos)</label
              >
              <div class="flex w-full">
                <input
                  type="text "
                  class="h-10 bg-white rounded-lg px-2"
                  id="time-amount"
                  name="time-amount"
                  required
                />
                <!-- <select
              class="w-1/3 bg-white text-center border-violet-950 border-l-2 rounded-r-lg hover:bg-violet-300 hover:text-violet-950 cursor-pointer"
              id="time-amount-period"
            >
              <option value="monthly">Mensal</option>
              <option value="yearly">Anual</option>
            </select> -->
              </div>
            </div>
            <div class="flex flex-col">
              <label for="return-rate" class="font-bold text-gray-500"
                >Juros (% A.A.)</label
              >
              <div class="flex w-full">
                <!-- <input
              value="%"
              class="w-1/6 bg-violet-300 text-center rounded-l-lg"
              type="text"
              disabled
            /> -->
                <input
                  type="text"
                  class="h-10 bg-white rounded-lg px-2"
                  id="return-rate"
                  name="return-rate"
                  required
                />
              </div>
              <!-- <select
              class="w-1/3 bg-white text-center border-violet-950 border-l-2 rounded-r-lg hover:bg-violet-300 hover:text-violet-950 cursor-pointer"
              id="evaluation-period"
            >
              <option value="monthly">Mensal</option>
              <option value="yearly">Anual</option>
            </select> -->
            </div>
          </div>
        </form>
      </div>
      <!-- <div class="px-6 py-2 flex h-12 my-8 w-full gap-2">

        <button

          class="w-1/2 rounded-lg hover:bg-violet-300 text-violet-300 hover:text-violet-950 cursor-pointer"
        >
          Limpar
        </button>
      </div> -->

      <p class="text-wrap text-xs px-6 py-2 t">
        Cálculos baseados em juros compostos mensais equivalentes. Impostos e
        taxas não são considerados.
      </p>
    </aside>
